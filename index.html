                    // ✅ กัน duplicate ถ้า add ซ้ำ
                    if (current.some(t => normalizeId(t.id) === task.id)) return prev;
                    return { ...prev, [taskKey]: [...current, task] };
                });
                saveTaskToSheets(task, taskKey);
            }, [selectedYear, selectedMonth, selectedDay]);

            // ✅ FIX: handleBatchAdd — id ไม่ชนกัน + duplicate check ถูกต้อง
            const handleBatchAdd = useCallback((multiLineText) => {
                if (!multiLineText.trim()) return;
                const lines = multiLineText.split('\n').filter(line => line.trim() !== '');

                setTasks(prevTasks => {
                    const updatedTasks = { ...prevTasks };
                    // deep clone วันที่เกี่ยวข้องเพื่อกัน mutation
                    Object.keys(updatedTasks).forEach(k => {
                        updatedTasks[k] = [...updatedTasks[k]];
                    });

                    let addCount = 0;
                    const newTasksToSave = [];

                    lines.forEach(line => {
                        // ✅ FIX: room regex — ต้องขึ้นต้นด้วยตัวเลข/อักษร แล้วตามด้วย space
                        const roomRegex = /^([0-9A-Za-z/-]+)\s+(.+)/;
                        let room = 'N/A';
                        let description = line.trim();
                        const match = line.match(roomRegex);
                        if (match) { room = match[1]; description = match[2].trim(); }

                        // ✅ FIX: date regex ต้องตามด้วย space หรือ end เพื่อกัน false match
                        const dateMatch = description.match(/^(\d{1,2})\/(\d{1,2})(?:\s|$)/);
                        let targetDay = selectedDay;
                        let targetMonth = selectedMonth;
                        let finalDescription = description;
                        if (dateMatch) {
                            targetDay = parseInt(dateMatch[1]);
                            targetMonth = parseInt(dateMatch[2]);
                            finalDescription = description.replace(dateMatch[0], '').trim();
                        }

                        if (!finalDescription) return; // ข้าม line ว่าง

                        const targetKey = `${selectedYear}-${targetMonth}-${targetDay}`;
                        if (!updatedTasks[targetKey]) updatedTasks[targetKey] = [];

                        const isDuplicate = updatedTasks[targetKey].some(t =>
                            `${t.room}${t.description}`.replace(/\s+/g,'') === `${room}${finalDescription}`.replace(/\s+/g,'')
                        );

                        if (!isDuplicate) {
                            // ✅ FIX: ใช้ generateId() กัน id ชนกัน
                            const newTask = { id: String(generateId()), room, description: finalDescription, status: 'hold' };
                            updatedTasks[targetKey] = [...updatedTasks[targetKey], newTask];
                            newTasksToSave.push({ key: targetKey, task: newTask });
                            addCount++;
                        }
                    });

                    if (addCount > 0) {
                        showNotification(`เพิ่มสำเร็จ ${addCount} รายการ`);
                        // save หลัง state อัปเดต
                        newTasksToSave.forEach(({ key, task }) => saveTaskToSheets(task, key));
                    }
                    return updatedTasks;
                });
            }, [selectedYear, selectedMonth, selectedDay, showNotification]);

            const handleUpdateTask = useCallback((updatedTask) => {
                const taskKey = `${selectedYear}-${selectedMonth}-${selectedDay}`;
                const task = { ...updatedTask, id: normalizeId(updatedTask.id) };
                setTasks(prev => {
                    const current = prev[taskKey] || [];
                    return { ...prev, [taskKey]: current.map(t => normalizeId(t.id) === task.id ? task : t) };
                });
                saveTaskToSheets(task, taskKey);
            }, [selectedYear, selectedMonth, selectedDay]);

            const handleDeleteTask = useCallback((taskId) => {
                const taskKey = `${selectedYear}-${selectedMonth}-${selectedDay}`;
                const nid = normalizeId(taskId);
                setTasks(prev => {
                    const current = prev[taskKey] || [];
                    return { ...prev, [taskKey]: current.filter(t => normalizeId(t.id) !== nid) };
                });
                deleteTaskFromSheets(taskId);
            }, [selectedYear, selectedMonth, selectedDay]);

            const handleAddFrequentTask = (item) => setFrequentTasks(prev => [...prev, item]);
            const handleDeleteFrequentTask = (item) => setFrequentTasks(prev => prev.filter(i => i !== item));

            const handleDateChange = (offset) => {
                const currentDate = new Date(selectedYear, selectedMonth - 1, selectedDay);
                currentDate.setDate(currentDate.getDate() + offset);
                setSelectedYear(currentDate.getFullYear());
                setSelectedMonth(currentDate.getMonth() + 1);
                setSelectedDay(currentDate.getDate());
            };

            const handleExportCSV = (year, month) => {
                const headers = ["วันที่","ห้อง","รายการซ่อม","สถานะ"];
                let csvRows = [headers.join(',')];
                for (let day = 1; day <= getDaysInMonth(year, month); day++) {
                    const taskKey = `${year}-${month}-${day}`;
                    if (tasks[taskKey] && tasks[taskKey].length > 0) {
                        csvRows.push('');
                        csvRows.push(`"--- วันที่ ${day} ${monthNames[month - 1]} ${year} ---"`);
                        tasks[taskKey].forEach(task => {
                            const date = `${year}-${String(month).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
                            const description = `"${task.description.replace(/"/g,'""')}"`;
                            const status = STATUSES[task.status]?.text || task.status;
                            csvRows.push([date, task.room, description, status].join(','));
                        });
                    }
                }
                const blob = new Blob([`\uFEFF${csvRows.join('\n')}`], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement('a');
                link.setAttribute('href', URL.createObjectURL(blob));
                link.setAttribute('download', `แท็กงาน-${year}-${String(month).padStart(2,'0')}.csv`);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            const goBackToMain = () => { setView('main'); setSelectedYear(null); setSelectedMonth(null); setSelectedDay(null); };
            const goBackToMonths = () => { setView('months'); setSelectedDay(null); };
            const goBackToDays = () => { setView('days'); setSelectedDay(null); };

            const frequentTaskStats = useMemo(() => {
                const counts = {};
                Object.values(tasks).forEach(dayTasks => {
                    dayTasks.forEach(task => {
                        const desc = task.description.trim();
                        if (desc) counts[desc] = (counts[desc] || 0) + 1;
                    });
                });
                return Object.entries(counts).sort(([,a],[,b]) => b - a).slice(0, 10);
            }, [tasks]);

            const renderContent = () => {
                switch (view) {
                    case 'tasks': {
                        const taskKey = `${selectedYear}-${selectedMonth}-${selectedDay}`;
                        return <TaskView
                            year={selectedYear} month={selectedMonth} day={selectedDay}
                            tasksForDay={tasks[taskKey] || []}
                            onAddTask={handleAddTask} onUpdateTask={handleUpdateTask} onDeleteTask={handleDeleteTask}
                            onBatchAdd={handleBatchAdd} onBack={goBackToDays}
                            onPrevDay={() => handleDateChange(-1)} onNextDay={() => handleDateChange(1)}
                            showNotification={showNotification} frequentTasks={frequentTasks}
                            onManageFrequentTasks={() => setIsManageFrequentOpen(true)}
                            suggestionsSource={suggestionsSource}
                        />;
                    }
                    case 'days':
                        return <DaysView year={selectedYear} month={selectedMonth} tasks={tasks} onSelectDay={handleSelectDay} onBack={goBackToMonths} onExport={handleExportCSV} />;
                    case 'months':
                        return <MonthsView year={selectedYear} onSelectMonth={handleSelectMonth} onBack={goBackToMain} />;
                    default:
                        return <MainMenu onSelectYear={handleSelectYear} frequentTaskStats={frequentTaskStats} holdTasksSummary={holdTasksSummary} onSelectTask={handleSelectSpecificDate} onSyncAll={handleSyncAllToSheets} isSyncing={isSyncing} />;
                }
            };

            if (isLoadingFromSheets) {
                return (
                    <div className="w-full min-h-screen bg-gradient-to-br from-sky-50 to-blue-100 dark:from-gray-800 dark:to-gray-900 flex flex-col items-center justify-center gap-4">
                        <div className="text-5xl animate-bounce">☁️</div>
                        <p className="text-xl font-bold text-sky-600 dark:text-amber-400">กำลังโหลดข้อมูลจาก Google Sheets...</p>
                        <p className="text-slate-400 text-sm">รอแป๊บนึงนะ (หมดเวลา 10 วินาที)</p>
                    </div>
                );
            }

            return (
                <div className="w-full min-h-screen bg-gradient-to-br from-sky-50 to-blue-100 dark:from-gray-800 dark:to-gray-900 text-slate-800 dark:text-sky-300 relative">
                    {notification && <Notification message={notification.message} onClose={() => setNotification(null)} />}
                    <ManageFrequentTasksModal isOpen={isManageFrequentOpen} onClose={() => setIsManageFrequentOpen(false)} frequentTasks={frequentTasks} onAdd={handleAddFrequentTask} onDelete={handleDeleteFrequentTask} />
                    {loadError && !syncStatus && (
                        <div className="fixed bottom-5 left-5 z-50 px-4 py-2 rounded-full text-sm font-semibold bg-orange-100 text-orange-800 dark:bg-orange-900/50 dark:text-orange-300 shadow-lg">
                            {loadError}
                        </div>
                    )}
                    <SyncStatus status={syncStatus} />
                    {renderContent()}
                    <button onClick={() => setTheme(theme === 'light' ? 'dark' : 'light')} className="fixed top-5 right-5 z-50 bg-white/80 dark:bg-slate-700/80 backdrop-blur-lg p-3 rounded-full shadow-lg text-yellow-500 dark:text-yellow-400">
                        {theme === 'light' ? <MoonIcon /> : <SunIcon />}
                    </button>
                </div>
            );
        };

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
