<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>แท็กงานของมิ้ว</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.23.10/babel.min.js"></script>
<style>
:root {
  --bg: #dceefb;
  --surface: #ffffff;
  --surface2: #eef6fd;
  --border: #c2ddf5;
  --text: #1a3a5c;
  --text2: #5a7a9a;
  --text3: #9ab8d0;
  --accent: #1e88e5;
  --accent-dark: #1565C0;
  --accent-light: #e3f2fd;
  --accent2: #00BCD4;
  --hold: #555555;
  --hold-bg: #e0e0e0;
  --hold-border: #aaaaaa;
  --pending: #b45309;
  --pending-bg: #fef08a;
  --pending-border: #ca8a04;
  --done: #10b981;
  --done-bg: #ecfdf5;
  --done-border: #6ee7b7;
  --cannot: #ef4444;
  --cannot-bg: #fee2e2;
  --cannot-border: #f87171;
  --radius: 16px;
  --radius-sm: 10px;
  --shadow: 0 2px 12px rgba(30,136,229,0.10);
  --shadow-lg: 0 8px 32px rgba(30,136,229,0.15);
}
/* dark mode removed */
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: 'Sarabun', sans-serif;
  background: linear-gradient(160deg, #c8e6fa 0%, #dceefb 40%, #e8f4fd 100%);
  background-attachment: fixed;
  color: var(--text);
  font-size: 15px;
  line-height: 1.6;
}
#root { min-height: 100vh; }

/* Layout */
.app { min-height: 100vh; display: flex; flex-direction: column; }
.topbar {
  position: sticky; top: 0; z-index: 50;
  background: rgba(255,255,255,0.85);
  border-bottom: 1px solid rgba(194,221,245,0.6);
  padding: 12px 16px;
  display: flex; align-items: center; justify-content: space-between;
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
}
.topbar-title { font-size: 17px; font-weight: 700; letter-spacing: -0.3px; }
.topbar-sub { font-size: 12px; color: var(--text2); margin-top: 1px; }
.topbar-actions { display: flex; gap: 8px; align-items: center; }

.page { flex: 1; padding: 16px; max-width: 720px; margin: 0 auto; width: 100%; }

/* Cards */
.card {
  background: rgba(255,255,255,0.92);
  border: 1px solid rgba(194,221,245,0.5);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  overflow: hidden;
}
.card + .card { margin-top: 12px; }
.card-header {
  padding: 14px 16px 12px;
  border-bottom: 1px solid rgba(194,221,245,0.4);
  font-weight: 600;
  font-size: 15px;
  color: var(--text);
  text-transform: none;
  letter-spacing: 0;
}
.card-body { padding: 16px; }

/* Buttons */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  padding: 8px 16px;
  border-radius: var(--radius-sm);
  font-family: inherit; font-size: 14px; font-weight: 500;
  cursor: pointer; border: none; transition: all 0.15s;
  text-decoration: none;
}
.btn:active { transform: scale(0.97); }
.btn-primary { background: linear-gradient(135deg, #1e88e5, #1565c0); color: #fff; border: none; box-shadow: 0 4px 12px rgba(30,136,229,0.3); }
.btn-primary:hover { background: linear-gradient(135deg, #1565c0, #0d47a1); box-shadow: 0 6px 16px rgba(30,136,229,0.4); }
.btn-ghost { background: rgba(255,255,255,0.8); color: var(--text2); border: 1.5px solid rgba(194,221,245,0.8); }
.btn-ghost:hover { background: rgba(227,242,253,0.6); color: var(--accent); border-color: var(--accent); }
.btn-danger { background: var(--cannot-bg); color: var(--cannot); border: 1px solid var(--cannot-border); }
.btn-danger:hover { background: var(--cannot); color: #fff; }
.btn-sm { padding: 5px 10px; font-size: 13px; }
.btn-icon { padding: 8px; border-radius: var(--radius-sm); background: transparent; border: 1px solid var(--border); color: var(--text2); cursor: pointer; transition: all 0.15s; }
.btn-icon:hover { background: var(--surface2); color: var(--text); }
.btn-icon:active { transform: scale(0.93); }

/* Inputs */
.input {
  width: 100%;
  padding: 10px 14px;
  border: 1.5px solid rgba(194,221,245,0.8);
  border-radius: var(--radius-sm);
  background: rgba(255,255,255,0.9);
  color: var(--text);
  font-family: inherit;
  font-size: 14px;
  transition: border-color 0.15s, box-shadow 0.15s;
}
.input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(30,136,229,0.12); background: #fff; }
.input::placeholder { color: var(--text3); }
textarea.input { resize: vertical; min-height: 80px; }
.input-group { display: flex; gap: 8px; }
.input-group .input { flex: 1; }
.label { font-size: 13px; font-weight: 500; color: var(--text2); margin-bottom: 5px; display: block; }

/* Status badges */
.badge {
  display: inline-flex; align-items: center;
  padding: 3px 10px;
  border-radius: 99px;
  font-size: 12px; font-weight: 600;
  border: 1px solid;
  cursor: pointer;
  transition: all 0.12s;
}
.badge:active { transform: scale(0.95); }
.badge-hold { background: var(--hold-bg); color: var(--hold); border-color: var(--hold-border); }
.badge-pending { background: var(--pending-bg); color: var(--pending); border-color: var(--pending-border); }
.badge-done { background: var(--done-bg); color: var(--done); border-color: var(--done-border); }
.badge-cannot { background: var(--cannot-bg); color: var(--cannot); border-color: var(--cannot-border); }

/* Task rows */
.task-row {
  display: flex; align-items: center; gap: 10px;
  padding: 11px 14px;
  border-bottom: 1px solid rgba(194,221,245,0.4);
  transition: background 0.12s;
}
.task-row:last-child { border-bottom: none; }
.task-row:hover { background: rgba(227,242,253,0.4); }
.task-row.done { opacity: 0.65; }
.task-room {
  font-weight: 700; font-size: 13px;
  min-width: 44px;
  color: var(--accent);
  padding-top: 1px;
}
.task-desc { flex: 1; font-size: 14px; line-height: 1.5; }
.task-actions { display: flex; gap: 4px; align-items: center; margin-left: 4px; }
.task-status-btn {
  background: none; border: none; cursor: pointer; padding: 3px 5px;
  border-radius: 6px; font-size: 11px; font-weight: 600;
  transition: all 0.12s; white-space: nowrap;
}

/* Month/Day grid */
.grid-months {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}
.grid-days {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 6px;
}
.month-btn, .day-btn {
  background: rgba(255,255,255,0.9);
  border: 1px solid rgba(194,221,245,0.6);
  border-radius: var(--radius-sm);
  padding: 14px 10px;
  text-align: center;
  cursor: pointer;
  transition: all 0.15s;
  font-family: inherit;
  color: var(--text);
  box-shadow: 0 1px 4px rgba(30,136,229,0.06);
}
.month-btn:hover, .day-btn:hover { border-color: var(--accent); color: var(--accent); transform: translateY(-2px); box-shadow: 0 4px 16px rgba(30,136,229,0.15); }
.month-btn .month-name { font-size: 15px; font-weight: 600; }
.month-btn .month-count { font-size: 11px; color: var(--text2); margin-top: 3px; }
.day-btn { padding: 8px 4px; }
.day-btn .day-num { font-size: 14px; font-weight: 600; }
.day-btn .day-count { font-size: 10px; color: var(--text2); }
.day-btn.has-tasks { border-color: rgba(30,136,229,0.4); }
.day-btn.has-tasks .day-num { color: var(--accent); }
.day-btn.has-cannot { position: relative; }
.day-btn.has-cannot::after { content: ''; position: absolute; bottom: 4px; right: 4px; width: 8px; height: 8px; background: var(--cannot); border-radius: 50%; border: 1.5px solid #fff; }
.day-btn.today { background: var(--accent-light); border-color: var(--accent); }
.day-btn.today .day-num { color: var(--accent); font-weight: 700; }

/* Nav */
.nav-back {
  display: inline-flex; align-items: center; gap: 5px;
  background: rgba(255,255,255,0.8); border: 1.5px solid rgba(194,221,245,0.7); cursor: pointer;
  color: var(--accent); font-family: inherit; font-size: 13px; font-weight: 600;
  padding: 6px 12px; border-radius: 99px;
}
.nav-back:hover { opacity: 0.8; }

/* Date nav */
.date-nav {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
}
.date-nav-center { text-align: center; }
.date-nav-title { font-size: 17px; font-weight: 700; }
.date-nav-sub { font-size: 12px; color: var(--text2); }

/* Stats */
.stats-row { display: flex; gap: 8px; flex-wrap: wrap; }
.stat-chip {
  display: flex; align-items: center; gap: 5px;
  padding: 5px 10px;
  border-radius: 99px;
  font-size: 12px; font-weight: 600;
  border: 1px solid rgba(194,221,245,0.7);
  background: rgba(255,255,255,0.8);
}

/* Suggestions */
.suggestion-list {
  position: absolute; z-index: 100;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  box-shadow: var(--shadow-lg);
  max-height: 200px;
  overflow-y: auto;
  width: 100%;
  top: calc(100% + 4px);
  left: 0;
}
.suggestion-item {
  padding: 9px 12px;
  font-size: 13px;
  cursor: pointer;
  border-bottom: 1px solid var(--border);
  transition: background 0.1s;
}
.suggestion-item:last-child { border-bottom: none; }
.suggestion-item:hover, .suggestion-item.active { background: var(--accent-light); color: var(--accent); }

/* Search */
.search-wrap { position: relative; }
.search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text3); }

/* Notification */
.notif {
  position: fixed; top: 70px; right: 16px; z-index: 200;
  background: var(--done-bg); color: var(--done); border: 1px solid var(--done-border);
  border-radius: var(--radius-sm); padding: 10px 16px;
  font-size: 14px; font-weight: 500;
  box-shadow: var(--shadow-lg);
  animation: slideIn 0.25s ease;
}
.notif.warn {
  background: var(--hold-bg); color: var(--hold); border-color: var(--hold-border);
}
@keyframes slideIn { from { opacity:0; transform: translateX(20px); } to { opacity:1; transform: translateX(0); } }

/* Modal */
.modal-overlay {
  position: fixed; inset: 0; z-index: 100;
  background: rgba(0,0,0,0.5);
  display: flex; align-items: flex-end; justify-content: center;
  padding: 0;
}
.modal {
  background: var(--surface);
  border-radius: var(--radius) var(--radius) 0 0;
  padding: 20px 16px;
  width: 100%; max-width: 520px;
  max-height: 85vh; overflow-y: auto;
  animation: slideUp 0.25s ease;
}
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.modal-title { font-size: 17px; font-weight: 700; margin-bottom: 16px; }
.modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 99px; margin: 0 auto 16px; }

/* Sync indicator */
.sync-dot {
  width: 8px; height: 8px; border-radius: 50%;
  display: inline-block; margin-right: 5px;
}
.sync-dot.syncing { background: var(--hold); animation: pulse 1s infinite; }
.sync-dot.ok { background: var(--done); }
.sync-dot.err { background: var(--cannot); }
@keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.3; } }

/* Hold summary */
.hold-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 16px;
  border-bottom: 1px solid rgba(194,221,245,0.4);
  cursor: pointer; transition: background 0.12s;
}
.hold-item:last-child { border-bottom: none; }
.hold-item:hover { background: rgba(227,242,253,0.5); }
.hold-item-left { flex: 1; }
.hold-item-date { font-size: 11px; color: var(--text2); margin-bottom: 2px; }
.hold-item-desc { font-size: 13px; font-weight: 500; }
.hold-item-room { font-size: 12px; color: var(--accent); font-weight: 600; }

/* Empty */
.empty { text-align: center; padding: 40px 16px; color: var(--text2); }
.empty-icon { font-size: 40px; margin-bottom: 10px; }
.empty-text { font-size: 14px; }

/* Loading */
.loading { text-align: center; padding: 60px 16px; }
.spinner {
  width: 36px; height: 36px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Tabs */
.tabs { display: flex; gap: 4px; padding: 4px; background: rgba(194,221,245,0.3); border-radius: 12px; border: 1px solid rgba(194,221,245,0.5); }
.tab { flex:1; padding: 7px 12px; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; background: none; border: none; color: var(--text2); font-family: inherit; transition: all 0.15s; text-align: center; }
.tab.active { background: white; color: var(--accent); box-shadow: 0 2px 8px rgba(30,136,229,0.12); font-weight: 600; }

/* Frequent chip */
.freq-chip {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 5px 10px; border-radius: 99px;
  background: var(--surface2); border: 1px solid var(--border);
  font-size: 12px; cursor: pointer; transition: all 0.12s;
  color: var(--text);
}
.freq-chip:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
.freq-chips { display: flex; flex-wrap: wrap; gap: 6px; }

/* Select */
select.input { cursor: pointer; }

/* Main menu stats */
.menu-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.stat-card {
  background: rgba(255,255,255,0.9); border: 1px solid rgba(194,221,245,0.5); border-radius: var(--radius);
  padding: 16px; text-align: center; box-shadow: 0 2px 8px rgba(30,136,229,0.07);
}
.stat-card .num { font-size: 28px; font-weight: 700; }
.stat-card .lbl { font-size: 12px; color: var(--text2); margin-top: 2px; }

/* Utility */
.flex { display: flex; }
.items-center { align-items: center; }
.justify-between { justify-content: space-between; }
.gap-2 { gap: 8px; }
.gap-3 { gap: 12px; }
.mt-2 { margin-top: 8px; }
.mt-3 { margin-top: 12px; }
.mt-4 { margin-top: 16px; }
.text-sm { font-size: 13px; }
.text-xs { font-size: 11px; }
.text-muted { color: var(--text2); }
.font-bold { font-weight: 700; }
.w-full { width: 100%; }
.relative { position: relative; }
.overflow-hidden { overflow: hidden; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useMemo, useRef, useCallback } = React;

// ─── Constants ───────────────────────────────────────────────────────────────
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxdE_Vk3cbblfH_eDBqbKfAg5DlRnjvnOfPu-HUyIw0xUUHWbaehDLL2-k7mXfLIBp3CQ/exec";

const MONTH_NAMES = ["มกราคม","กุมภาพันธ์","มีนาคม","เมษายน","พฤษภาคม","มิถุนายน","กรกฎาคม","สิงหาคม","กันยายน","ตุลาคม","พฤศจิกายน","ธันวาคม"];

const STATUSES = {
  hold:    { label: 'Hold',    cls: 'badge-hold',    emoji: '⏸' },
  pending: { label: 'Pending', cls: 'badge-pending', emoji: '🔄' },
  done:    { label: 'Done',    cls: 'badge-done',    emoji: '✅' },
  cannot:  { label: 'Cannot', cls: 'badge-cannot',   emoji: '✗' },
};
const STATUS_CYCLE = ['hold','pending','done','cannot'];

const DEFAULT_FREQUENT = ["ทำความสะอาดฟิลเตอร์แอร์","ไม้จูงม่านหลุด","แก้วอล","แอร์กระพริบ","น้ำรั่ว","เปลี่ยนถ่านตาชั่ง","ผนังร้าว","ไฟตู้ผ้ากระพริบ","น้ำไม่ร้อน","ซิลิโคนอ่างล้างหน้า"];

// ─── Date Helpers ─────────────────────────────────────────────────────────────
const getDaysInMonth = (y, m) => new Date(y, m, 0).getDate();

// Robust date parser — รองรับทุก format ที่ Sheets ส่งมา
const dateStringToKey = (s) => {
  if (!s) return null;
  s = String(s).trim();

  // "dd-mm-yyyy"
  let m = s.match(/^(\d{1,2})-(\d{1,2})-(\d{4})$/);
  if (m) {
    const d=+m[1], mo=+m[2], y=+m[3];
    if (d>=1&&d<=31&&mo>=1&&mo<=12) return `${y}-${mo}-${d}`;
  }

  // "dd/mm/yyyy"
  m = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if (m) {
    const d=+m[1], mo=+m[2], y=+m[3];
    if (d>=1&&d<=31&&mo>=1&&mo<=12) return `${y}-${mo}-${d}`;
  }

  // ISO "2026-05-06T..." — ดึงแค่ส่วน date ข้างหน้า T
  if (s.includes('T')) {
    const part = s.split('T')[0];
    m = part.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);
    if (m) {
      const y=+m[1], mo=+m[2], d=+m[3];
      if (d>=1&&d<=31&&mo>=1&&mo<=12) return `${y}-${mo}-${d}`;
    }
  }

  // "yyyy-mm-dd"
  m = s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);
  if (m) {
    const y=+m[1], mo=+m[2], d=+m[3];
    if (d>=1&&d<=31&&mo>=1&&mo<=12) return `${y}-${mo}-${d}`;
  }

  // JS Date.toString() เช่น "Thu Mar 05 2026 00:00:00 GMT+0700 (เวลาอินโดจีน)"
  if (s.includes('GMT') || /^[A-Za-z]{3} [A-Za-z]{3}/.test(s)) {
    const dt = new Date(s);
    if (!isNaN(dt.getTime())) {
      return `${dt.getFullYear()}-${dt.getMonth()+1}-${dt.getDate()}`;
    }
  }

  // fallback: ลอง new Date() เลย
  try {
    const dt = new Date(s);
    if (!isNaN(dt.getTime()) && dt.getFullYear() > 2000) {
      return `${dt.getFullYear()}-${dt.getMonth()+1}-${dt.getDate()}`;
    }
  } catch(e) {}

  console.warn('dateStringToKey: unknown format →', s);
  return null;
};

const keyToDisplayDate = (key) => {
  const [y, mo, d] = key.split('-');
  return `${String(d).padStart(2,'0')}-${String(mo).padStart(2,'0')}-${y}`;
};

// เก็บใน Sheets เป็น ISO yyyy-mm-dd เพื่อไม่ให้ JS parse สลับวัน/เดือน
const keyToDateString = (key) => {
  const [y, mo, d] = key.split('-');
  return `${y}-${String(mo).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
};

// ─── ID helpers ──────────────────────────────────────────────────────────────
const normalizeId = (id) => {
  if (id===null||id===undefined||id==='') return '';
  const n = Number(String(id).trim());
  return (isFinite(n)&&!isNaN(n)) ? n.toFixed(0) : String(id).trim();
};

const generateId = () => crypto.randomUUID();

// ─── Sheets API ───────────────────────────────────────────────────────────────
// ── fetch helpers (แทน JSONP) ────────────────────────────────
const fetchWithRetry = async (url, retries = 3, delay = 2000) => {
  for (let i = 0; i < retries; i++) {
    try {
      const res = await fetch(url, { method: 'GET' });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      return await res.json();
    } catch(e) {
      console.warn(`[Fetch] attempt ${i+1}/${retries} failed:`, e.message);
      if (i < retries - 1) await new Promise(r => setTimeout(r, delay));
      else throw e;
    }
  }
};

const fetchAllFromSheets = async () => {
  try {
    const data = await fetchWithRetry(`${APPS_SCRIPT_URL}?action=getAllTasks`);
    if (!Array.isArray(data)) { console.warn('[Sheets] non-array response:', JSON.stringify(data)); }
    return Array.isArray(data) ? data : null;
  } catch(e) {
    console.error('[Sheets] fetchAllFromSheets failed:', e.message);
    return null;
  }
};

const fetchConfigFromSheets = async (key) => {
  try {
    const data = await fetchWithRetry(`${APPS_SCRIPT_URL}?action=getConfig&key=${key}`);
    if (data && data.value) return JSON.parse(data.value);
    return null;
  } catch(e) { return null; }
};

const saveConfigToSheets = async (key, value) => {
  try {
    await fetch(APPS_SCRIPT_URL, {
      method: 'POST', redirect: 'follow',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ action: 'saveConfig', key, value: JSON.stringify(value) })
    });
    return true;
  } catch(e) { return false; }
};

const saveToSheets = async (task, dateKey, onError) => {
  try {
    await fetch(APPS_SCRIPT_URL, {
      method: 'POST', redirect: 'follow',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ action: 'upsertTask', task: {
        id: normalizeId(task.id), date: keyToDateString(dateKey),
        room: task.room, description: task.description, status: task.status
      }})
    });
  } catch(e) {
    addRetry({ action:'upsert', dateKey, task });
    if (onError) onError();
  }
};

const deleteFromSheets = async (taskId, onError) => {
  try {
    await fetch(APPS_SCRIPT_URL, {
      method: 'POST', redirect: 'follow',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ action: 'deleteTask', id: normalizeId(taskId) })
    });
  } catch(e) {
    addRetry({ action:'delete', id: normalizeId(taskId) });
    if (onError) onError();
  }
};

// Retry queue
const RETRY_KEY = 'mew-retry-v2';
const addRetry = (item) => {
  try {
    const q = JSON.parse(localStorage.getItem(RETRY_KEY)||'[]');
    q.push(item); localStorage.setItem(RETRY_KEY, JSON.stringify(q));
  } catch(e) {}
};
const flushRetry = async () => {
  try {
    const q = JSON.parse(localStorage.getItem(RETRY_KEY)||'[]');
    if (!q.length) return;
    const failed = [];
    for (const item of q) {
      try {
        if (item.action==='upsert') await saveToSheets(item.task, item.dateKey);
        else if (item.action==='delete') await deleteFromSheets(item.id);
      } catch(e) { failed.push(item); }
    }
    localStorage.setItem(RETRY_KEY, JSON.stringify(failed));
  } catch(e) {}
};

// rows → task map
const rowsToMap = (rows) => {
  const map = {};
  const seen = new Set();
  rows.forEach(row => {
    if (!row.date||!row.id) return;
    const nid = normalizeId(row.id);
    if (!nid||seen.has(nid)) return;
    seen.add(nid);
    const key = dateStringToKey(row.date);
    if (!key) return;
    if (!map[key]) map[key] = [];
    map[key].push({ id: nid, room: row.room||'N/A', description: row.description||'', status: row.status||'hold' });
  });
  return map;
};

// ─── Task View ─────────────────────────────────────────────────────────────────
const TaskView = ({ year, month, day, tasks, onAddTask, onUpdateTask, onDeleteTask, onBack, onPrev, onNext, frequent, onManageFreq, showNotif, allTasks }) => {
  const [room, setRoom] = useState('');
  const [desc, setDesc] = useState('');
  const [status, setStatus] = useState('hold');
  const [batchText, setBatchText] = useState('');
  const [search, setSearch] = useState('');
  const [sortMode, setSortMode] = useState('');
  const [editTask, setEditTask] = useState(null);
  const [deleteId, setDeleteId] = useState(null);
  const [suggestions, setSuggestions] = useState([]);
  const [suggIdx, setSuggIdx] = useState(-1);
  const [showFreqModal, setShowFreqModal] = useState(false);
  const descRef = useRef();

  // Suggestion source: all unique descriptions
  const allDescs = useMemo(() => {
    const set = new Set();
    Object.values(allTasks).forEach(arr => arr.forEach(t => t.description && set.add(t.description)));
    frequent.forEach(f => set.add(f));
    return [...set];
  }, [allTasks, frequent]);

  const handleDescChange = (val) => {
    setDesc(val);
    if (val.length >= 2) {
      const q = val.toLowerCase();
      setSuggestions(allDescs.filter(d => d.toLowerCase().includes(q)).slice(0, 8));
    } else setSuggestions([]);
    setSuggIdx(-1);
  };

  const pickSugg = (s) => { setDesc(s); setSuggestions([]); setSuggIdx(-1); };

  const handleDescKey = (e) => {
    if (e.key==='Enter') {
      if (suggestions.length && suggIdx>=0) { e.preventDefault(); pickSugg(suggestions[suggIdx]); }
      else { e.preventDefault(); setSuggestions([]); addTask(); }
      return;
    }
    if (!suggestions.length) return;
    if (e.key==='ArrowDown') { e.preventDefault(); setSuggIdx(i => (i+1)%suggestions.length); }
    else if (e.key==='ArrowUp') { e.preventDefault(); setSuggIdx(i => i<=0?suggestions.length-1:i-1); }
    else if (e.key==='Escape') setSuggestions([]);
  };

  const addTask = () => {
    if (!desc.trim()) return;
    const t = { id: generateId(), room: room.trim()||'N/A', description: desc.trim(), status };
    onAddTask(t);
    setDesc(''); setRoom(''); setStatus('hold'); setSuggestions([]);
    showNotif('เพิ่มรายการแล้ว');
  };

  const batchAdd = () => {
    if (!batchText.trim()) return;
    let count = 0;
    batchText.trim().replace(/\r/g, '').split('\n').forEach(line => {
      line = line.trim(); if (!line) return;
      const parts = line.split(/\s+/);
      let r = 'N/A', d = line;
      // เลขห้อง: 2-5 หลัก หรือ prefix ตัวอักษรตามด้วยตัวเลข เช่น A501, B-201
      if (parts.length > 1 && /^[A-Za-z]?-?\d{2,5}$/.test(parts[0])) { r = parts[0]; d = parts.slice(1).join(' '); }
      const t = { id: generateId(), room: r, description: d, status: 'hold' };
      onAddTask(t); count++;
    });
    setBatchText(''); showNotif(`เพิ่มสำเร็จ ${count} รายการ`);
  };

  const filtered = useMemo(() => {
    let arr = tasks;
    if (search) {
      const q = search.toLowerCase();
      arr = arr.filter(t => t.description.toLowerCase().includes(q) || t.room.toLowerCase().includes(q));
    }
    if (sortMode === 'done') {
      const order = { done:0, pending:1, hold:2, cannot:3 };
      arr = [...arr].sort((a,b) => (order[a.status]??9) - (order[b.status]??9));
    } else if (sortMode === 'hold') {
      const order = { hold:0, pending:1, done:2, cannot:3 };
      arr = [...arr].sort((a,b) => (order[a.status]??9) - (order[b.status]??9));
    } else if (sortMode === 'room') {
      arr = [...arr].sort((a,b) => a.room.localeCompare(b.room, 'th'));
    }
    return arr;
  }, [tasks, search, sortMode]);

  const stats = useMemo(() => {
    const s = { hold:0, pending:0, done:0, cannot:0 };
    tasks.forEach(t => { if (s[t.status]!==undefined) s[t.status]++; });
    return s;
  }, [tasks]);

  const thDate = `${day} ${MONTH_NAMES[month-1]} ${year}`;

  return (
    <div className="app">
      <div className="topbar">
        <button className="nav-back" onClick={onBack}>← กลับ</button>
        <div style={{textAlign:'center'}}>
          <div className="topbar-title">วันที่ {thDate}</div>
          <div className="topbar-sub">บันทึกรายการแก้งาน</div>
        </div>
        <div className="topbar-actions">
          <button className="btn-icon" onClick={onPrev} title="วันก่อน">◀</button>
          <button className="btn-icon" onClick={onNext} title="วันถัดไป">▶</button>
        </div>
      </div>

      <div className="page">

        {/* ── Batch Add ── */}
        <div className="card" style={{marginBottom:12}}>
          <div className="card-header">วางหลายรายการจาก LINE ที่นี่ (Batch Add)</div>
          <div className="card-body">
            <textarea className="input" value={batchText} onChange={e=>setBatchText(e.target.value)}
              placeholder={"501 แอร์ไม่เย็น\n503 ก๊อกน้ำรั่ว\nซิลิโคนอ่างล้างหน้า"} rows={4} style={{marginBottom:10}}/>
            <button className="btn btn-primary" onClick={batchAdd} style={{borderRadius:99}}>+ เพิ่มหลายรายการ</button>
          </div>
        </div>

        {/* ── Add Single ── */}
        <div className="card" style={{marginBottom:12}}>
          <div className="card-header">เพิ่มรายการใหม่ (ทีละรายการ)</div>
          <div className="card-body">
            <div style={{display:'flex',gap:8,marginBottom:10}}>
              <div style={{flex:'0 0 130px'}}>
                <label className="label">เลขห้อง (ถ้ามี)</label>
                <input className="input" value={room} onChange={e=>setRoom(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addTask()} placeholder="เช่น 2316"/>
              </div>
              <div style={{flex:1}} className="relative">
                <label className="label">* รายการซ่อม (พิมพ์เพื่อค้นหา)</label>
                <input
                  className="input" ref={descRef}
                  value={desc} onChange={e=>handleDescChange(e.target.value)}
                  onKeyDown={handleDescKey}
                  placeholder="พิมพ์เพื่อค้นหาหรือเพิ่มใหม่"
                />
                {suggestions.length > 0 && (
                  <div className="suggestion-list">
                    {suggestions.map((s,i) => (
                      <div key={i} className={`suggestion-item ${i===suggIdx?'active':''}`} onMouseDown={()=>pickSugg(s)}>{s}</div>
                    ))}
                  </div>
                )}
              </div>
            </div>
            <div style={{display:'flex',gap:8,alignItems:'flex-end'}}>
              <div style={{flex:'0 0 130px'}}>
                <label className="label">สถานะ</label>
                <select className="input" value={status} onChange={e=>setStatus(e.target.value)}>
                  {STATUS_CYCLE.map(s => <option key={s} value={s}>{STATUSES[s].label}</option>)}
                </select>
              </div>
              <button className="btn btn-primary" onClick={addTask} style={{flex:1,borderRadius:99}}>+ เพิ่มรายการ</button>
            </div>
            {frequent.length > 0 && (
              <div style={{marginTop:14,paddingTop:12,borderTop:'1px solid rgba(194,221,245,0.4)'}}>
                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8}}>
                  <span className="label" style={{margin:0}}>รายการใช้บ่อย</span>
                  <button className="btn btn-ghost btn-sm" onClick={()=>setShowFreqModal(true)}>จัดการ</button>
                </div>
                <div className="freq-chips">
                  {frequent.map((f,i) => (
                    <span key={i} className="freq-chip" onClick={()=>setDesc(f)}>{f}</span>
                  ))}
                </div>
              </div>
            )}
          </div>
        </div>

        {/* ── Task List ── */}
        <div className="card">
          <div style={{padding:'10px 14px',borderBottom:'1px solid rgba(194,221,245,0.4)',display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
            <div style={{fontSize:13,fontWeight:700,color:'var(--text)',marginRight:4}}>รายการทั้งหมด ({filtered.length})</div>
            {tasks.length > 0 && Object.entries(stats).filter(([,v])=>v>0).map(([k,v]) =>
              <span key={k} className={`badge ${STATUSES[k].cls}`} style={{cursor:'default',fontSize:11}}>{STATUSES[k].label} {v}</span>
            )}
            <div style={{flex:1}}/>
            <select className="input" style={{width:'auto',fontSize:12,padding:'5px 8px',flex:'0 0 auto'}} value={sortMode} onChange={e=>setSortMode(e.target.value)}>
              <option value="">ลำดับปกติ</option>
              <option value="done">Done ก่อน</option>
              <option value="hold">Hold ก่อน</option>
              <option value="room">ห้องเรียง</option>
            </select>
            <input className="input" value={search} onChange={e=>setSearch(e.target.value)} placeholder="ค้นหารายการ..." style={{fontSize:13,flex:'0 0 160px'}}/>
          </div>
          {filtered.length === 0 ? (
            <div className="empty">
              <div className="empty-icon">{search?'🔍':'📋'}</div>
              <div className="empty-text">{search?'ไม่พบรายการที่ค้นหา':'ยังไม่มีรายการ'}</div>
            </div>
          ) : filtered.map((t,i) => (
            <TaskRow
              key={t.id} task={t} idx={i+1}
              onStatusChange={updated => onUpdateTask(updated)}
              onEdit={setEditTask}
              onDelete={id => setDeleteId(id)}
              onDuplicate={t => { onAddTask({...t, id: generateId()}); showNotif('คัดลอกแล้ว'); }}
              showNotif={showNotif}
            />
          ))}
        </div>

      </div>

      {/* Modals */}
      {editTask && (
        <EditModal task={editTask} onClose={()=>setEditTask(null)}
          onSave={t => { onUpdateTask(t); setEditTask(null); showNotif('บันทึกแล้ว'); }}/>
      )}
      {deleteId && (
        <ConfirmModal msg="ต้องการลบรายการนี้ใช่ไหม?" onClose={()=>setDeleteId(null)}
          onConfirm={() => { onDeleteTask(deleteId); setDeleteId(null); showNotif('ลบแล้ว'); }}/>
      )}
      {showFreqModal && (
        <FreqModal tasks={frequent}
          onAdd={f => onManageFreq('add', f)}
          onDelete={f => onManageFreq('del', f)}
          onClose={()=>setShowFreqModal(false)}/>
      )}
    </div>
  );
};

// ─── Days View ─────────────────────────────────────────────────────────────────
const DaysView = ({ year, month, tasks, onSelectDay, onBack, onExport }) => {
  const days = getDaysInMonth(year, month);
  const today = new Date();
  const isToday = (d) => today.getFullYear()===year && today.getMonth()+1===month && today.getDate()===d;
  const [search, setSearch] = useState('');

  const searchResults = useMemo(() => {
    if (!search.trim()) return null;
    const q = search.toLowerCase();
    const results = [];
    for (let d=1; d<=days; d++) {
      const key = `${year}-${month}-${d}`;
      (tasks[key]||[]).forEach(t => {
        if (t.description.toLowerCase().includes(q) || t.room.toLowerCase().includes(q)) {
          results.push({ ...t, day: d });
        }
      });
    }
    return results;
  }, [search, tasks, year, month, days]);

  const monthStats = useMemo(() => {
    let total=0,pending=0,done=0,cannot=0,hold=0;
    for(let d=1;d<=days;d++){const k=`${year}-${month}-${d}`;(tasks[k]||[]).forEach(t=>{total++;if(t.status==='pending')pending++;else if(t.status==='done')done++;else if(t.status==='cannot')cannot++;else if(t.status==='hold')hold++;});}
    return {total,pending,done,cannot,hold};
  }, [tasks, year, month, days]);
  return (
    <div className="app">
      <div className="topbar">
        <button className="nav-back" onClick={onBack}>← กลับ</button>
        <div style={{textAlign:'center'}}>
          <div className="topbar-title">{MONTH_NAMES[month-1]}</div>
          <div className="topbar-sub">{year}</div>
        </div>
        <button className="btn btn-primary btn-sm" style={{borderRadius:99,fontSize:12}} onClick={()=>onExport(year,month)}>⬇ ส่งออก CSV</button>
      </div>
      <div className="page" style={{paddingTop:16}}>
        {/* Search bar */}
        <div style={{marginBottom:12}}>
          <input className="input" value={search} onChange={e=>setSearch(e.target.value)} placeholder="ค้นหางานทั้งหมดในเดือนนี้..." style={{borderRadius:99,paddingLeft:16}}/>
        </div>
        {/* Stats bar */}
        <div style={{background:'rgba(255,255,255,0.9)',border:'1px solid rgba(194,221,245,0.5)',borderRadius:16,padding:'12px 16px',marginBottom:14,display:'flex',gap:16,boxShadow:'0 2px 8px rgba(30,136,229,0.07)'}}>
          <div style={{textAlign:'center',flex:1}}><div style={{fontWeight:700,fontSize:18,color:'var(--text)'}}>{monthStats.total}</div><div style={{fontSize:11,color:'var(--text2)'}}>งานทั้งหมด</div></div>
          <div style={{textAlign:'center',flex:1}}><div style={{fontWeight:700,fontSize:18,color:'var(--pending)'}}>{monthStats.pending}</div><div style={{fontSize:11,color:'var(--text2)'}}>กำลังแท็ก</div></div>
          <div style={{textAlign:'center',flex:1}}><div style={{fontWeight:700,fontSize:18,color:'var(--done)'}}>{monthStats.done}</div><div style={{fontSize:11,color:'var(--text2)'}}>แท็กได้</div></div>
          <div style={{textAlign:'center',flex:1}}><div style={{fontWeight:700,fontSize:18,color:'var(--hold)'}}>{monthStats.hold}</div><div style={{fontSize:11,color:'var(--text2)'}}>ยังไม่แท็ก</div></div>
          <div style={{textAlign:'center',flex:1}}><div style={{fontWeight:700,fontSize:18,color:'var(--cannot)'}}>{monthStats.cannot}</div><div style={{fontSize:11,color:'var(--text2)'}}>แท็กไม่ได้</div></div>
        </div>
        {searchResults && (
          <div className="card" style={{marginBottom:12}}>
            {searchResults.length === 0 ? (
              <div className="empty"><div className="empty-icon">🔍</div><div className="empty-text">ไม่พบรายการที่ค้นหา</div></div>
            ) : searchResults.map((t,i) => (
              <div key={i} className="task-row" style={{cursor:'pointer'}} onClick={()=>onSelectDay(t.day)}>
                <div style={{minWidth:28,fontSize:11,color:'var(--text3)',fontWeight:600}}>{t.day}</div>
                <div className="task-room" style={{minWidth:40}}>{t.room}</div>
                <div className="task-desc" style={{fontSize:13,flex:1}}>{t.description}</div>
                <span className={`badge ${STATUSES[t.status]?.cls||''}`} style={{fontSize:11,cursor:'default'}}>{STATUSES[t.status]?.label||t.status}</span>
              </div>
            ))}
          </div>
        )}
        <div className="grid-days">
          {Array.from({length:days},(_,i)=>i+1).map(d => {
            const key = `${year}-${month}-${d}`;
            const dayTasks = tasks[key]||[];
            const count = dayTasks.length;
            const hasCannot = dayTasks.some(t=>t.status==='cannot');
            return (
              <button key={d} className={`day-btn ${count>0?'has-tasks':''} ${isToday(d)?'today':''} ${hasCannot?'has-cannot':''}`} onClick={()=>onSelectDay(d)}>
                <div className="day-num">{d}</div>
                <div className="day-count">{count>0?count:''}</div>
              </button>
            );
          })}
        </div>
      </div>
    </div>
  );
};

// ─── Months View ───────────────────────────────────────────────────────────────
const MonthsView = ({ year, tasks, onSelectMonth, onBack }) => {
  const counts = useMemo(() => {
    const c = Array(12).fill(0);
    Object.entries(tasks).forEach(([key, arr]) => {
      const [y,m] = key.split('-');
      if (+y===year) c[+m-1] += arr.length;
    });
    return c;
  }, [tasks, year]);
  return (
    <div className="app">
      <div className="topbar">
        <button className="nav-back" onClick={onBack}>← กลับ</button>
        <div style={{textAlign:'center'}}>
          <div className="topbar-title">ปี {year}</div>
        </div>
        <div style={{width:60}}></div>
      </div>
      <div className="page" style={{paddingTop:16}}>
        <div className="grid-months">
          {MONTH_NAMES.map((name,i) => (
            <button key={i} className="month-btn" onClick={()=>onSelectMonth(i+1)}>
              <div className="month-name">{name.slice(0,3)}.</div>
              <div className="month-count">{counts[i]>0?`${counts[i]} รายการ`:'-'}</div>
            </button>
          ))}
        </div>
      </div>
    </div>
  );
};

// ─── Hold Summary Card ────────────────────────────────────────────────────────
const HoldSummaryCard = ({ holdSummary, onSelectDate }) => {
  const [showAll, setShowAll] = useState(false);
  const visible = showAll ? holdSummary : holdSummary.slice(0, 10);
  return (
    <div className="card" style={{marginTop:12}}>
      <div className="card-header" style={{fontWeight:700,fontSize:15,color:"var(--text)",display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <span>งาน Hold ทั้งหมดที่ยังไม่แท็ก</span>
        <span style={{fontSize:12,color:'var(--text2)',fontWeight:500}}>{holdSummary.length} รายการ</span>
      </div>
      {visible.map((item,i) => (
        <div key={i} className="hold-item" onClick={()=>onSelectDate(item.year,item.month,item.day)}>
          <div className="hold-item-left">
            <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:2}}>
              <span className="hold-item-room">{item.room && item.room !== 'N/A' ? `ห้อง ${item.room}` : ''}</span>
              <span className="hold-item-date">· {item.day} {MONTH_NAMES[item.month-1]} {item.year}</span>
            </div>
            <div className="hold-item-desc">{item.description}</div>
          </div>
          <span style={{color:'var(--text3)',fontSize:13}}>›</span>
        </div>
      ))}
      {holdSummary.length > 10 && (
        <div style={{textAlign:'center',padding:'10px'}}>
          <button className="btn btn-ghost btn-sm" style={{borderRadius:99}} onClick={()=>setShowAll(v=>!v)}>
            {showAll ? '▲ ย่อลง' : `▼ ดูทั้งหมด (${holdSummary.length - 10} รายการ)`}
          </button>
        </div>
      )}
    </div>
  );
};

// ─── Main Menu ─────────────────────────────────────────────────────────────────
const MainMenu = ({ tasks, onSelectYear, onSync, isSyncing, frequent, freqStats, holdSummary, onSelectDate }) => {
  const today = new Date();
  const todayKey = `${today.getFullYear()}-${today.getMonth()+1}-${today.getDate()}`;
  const todayCount = (tasks[todayKey]||[]).length;

  const totalTasks = useMemo(() => Object.values(tasks).reduce((s,a)=>s+a.length,0), [tasks]);
  const holdCount = useMemo(() => Object.values(tasks).reduce((s,a)=>s+a.filter(t=>t.status==='hold').length,0), [tasks]);

  const [extraYears, setExtraYears] = React.useState(() => {
    try { return JSON.parse(localStorage.getItem('mew-extra-years')) || []; } catch { return []; }
  });

  // โหลดปีจาก Sheets เมื่อ mount
  React.useEffect(() => {
    fetchConfigFromSheets('extraYears').then(val => {
      if (Array.isArray(val) && val.length > 0) {
        setExtraYears(val);
        try { localStorage.setItem('mew-extra-years', JSON.stringify(val)); } catch(e) {}
      }
    });
  }, []);

  const years = useMemo(() => {
    const ys = new Set();
    Object.keys(tasks).forEach(k => ys.add(+k.split('-')[0]));
    ys.add(today.getFullYear());
    extraYears.forEach(y => ys.add(y));
    return [...ys].sort((a,b)=>b-a);
  }, [tasks, extraYears]);

  const [editYearMode, setEditYearMode] = React.useState(false);

  const handleAddYear = () => {
    const input = prompt('กรอกปี ค.ศ. ที่ต้องการเพิ่ม เช่น 2024');
    const y = parseInt(input);
    if (!y || isNaN(y) || y < 2000 || y > 2100) { alert('ปีไม่ถูกต้อง'); return; }
    if (years.includes(y)) { alert('มีปีนี้อยู่แล้ว'); return; }
    const updated = [...extraYears, y];
    setExtraYears(updated);
    try { localStorage.setItem('mew-extra-years', JSON.stringify(updated)); } catch(e) {}
    saveConfigToSheets('extraYears', updated);
  };

  const handleRemoveYear = (y) => {
    if (y === today.getFullYear()) { alert('ลบปีปัจจุบันไม่ได้'); return; }
    const hasData = Object.keys(tasks).some(k => +k.split('-')[0] === y);
    if (hasData) { alert('ปี ' + y + ' ยังมีข้อมูลใน Sheets อยู่\nกรุณาลบข้อมูลใน Sheets ก่อน'); return; }
    const updated = extraYears.filter(x => x !== y);
    setExtraYears(updated);
    try { localStorage.setItem('mew-extra-years', JSON.stringify(updated)); } catch(e) {}
    saveConfigToSheets('extraYears', updated);
  };

  return (
    <div className="app">
      <div style={{background:'rgba(255,255,255,0.0)',paddingTop:32,paddingBottom:8,textAlign:'center'}}>
        <div style={{fontSize:32,fontWeight:800,color:'#1565c0',letterSpacing:-1,lineHeight:1.1}}>แท็กงานของมิ้ว</div>
        <div style={{fontSize:14,color:'#5a7a9a',marginTop:4,marginBottom:20}}>ศูนย์บัญชาการ (Mission Control)</div>
      </div>

      <div className="page" style={{paddingTop:16}}>
        {/* Stats */}
        <div className="menu-stats" style={{marginBottom:16}}>
          <div className="stat-card">
            <div className="num" style={{color:'var(--accent)'}}>{todayCount}</div>
            <div className="lbl">รายการวันนี้</div>
          </div>
          <div className="stat-card">
            <div className="num" style={{color:'var(--hold)'}}>{holdCount}</div>
            <div className="lbl">รายการ Hold</div>
          </div>
          <div className="stat-card">
            <div className="num">{totalTasks}</div>
            <div className="lbl">ทั้งหมด</div>
          </div>
          <div className="stat-card">
            <div className="num">{years.length}</div>
            <div className="lbl">ปีที่บันทึก</div>
          </div>
        </div>

        {/* Today shortcut */}
        <button className="btn btn-primary w-full" style={{marginBottom:12,padding:14,fontSize:15,borderRadius:99}}
          onClick={()=>onSelectDate(today.getFullYear(), today.getMonth()+1, today.getDate())}>
          📅 วันนี้ — {today.getDate()} {MONTH_NAMES[today.getMonth()]} {today.getFullYear()}
        </button>

        {/* Year list */}
        <div style={{display:'flex',gap:12,justifyContent:'center',flexWrap:'wrap',marginBottom:8}}>
          {years.map(y => (
            <div key={y} style={{position:'relative',display:'inline-flex'}}>
              <button onClick={()=>{ if(!editYearMode) onSelectYear(y); }}
                style={{padding:'12px 36px',borderRadius:99,background:editYearMode?'rgba(100,100,100,0.5)':'linear-gradient(135deg,#1e88e5,#1565c0)',color:'#fff',border:'none',fontSize:17,fontWeight:700,cursor:'pointer',boxShadow:'0 4px 14px rgba(30,136,229,0.35)',fontFamily:'inherit',opacity:editYearMode&&y===today.getFullYear()?0.5:1}}>
                {y}
              </button>
              {editYearMode && y !== today.getFullYear() && (
                <button onClick={()=>handleRemoveYear(y)}
                  style={{position:'absolute',top:-6,right:-6,width:22,height:22,borderRadius:'50%',background:'#ef4444',color:'#fff',border:'2px solid #fff',fontSize:13,fontWeight:700,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',lineHeight:1,padding:0}}>
                  ✕
                </button>
              )}
            </div>
          ))}
          <button onClick={handleAddYear}
            style={{padding:'12px 20px',borderRadius:99,background:'rgba(255,255,255,0.9)',color:'var(--accent)',border:'2px dashed var(--accent)',fontSize:17,fontWeight:700,cursor:'pointer',fontFamily:'inherit',display:'inline-flex',alignItems:'center',gap:6}}>
            ＋ เพิ่มปี
          </button>
        </div>
        <div style={{textAlign:'center',marginBottom:12}}>
          <button onClick={()=>setEditYearMode(v=>!v)}
            style={{padding:'5px 16px',borderRadius:99,background:editYearMode?'#ef4444':'transparent',color:editYearMode?'#fff':'var(--text3)',border:'1px solid',borderColor:editYearMode?'#ef4444':'var(--border)',fontSize:12,fontWeight:600,cursor:'pointer',fontFamily:'inherit'}}>
            {editYearMode ? '✓ เสร็จแล้ว' : '🗑 จัดการปี'}
          </button>
        </div>

        {/* Sync button */}
        <div style={{textAlign:'center',marginBottom:16}}>
          <button onClick={onSync} disabled={isSyncing}
            style={{padding:'10px 24px',borderRadius:99,background:isSyncing?'#aaa':'linear-gradient(135deg,#26a69a,#00897b)',color:'#fff',border:'none',fontSize:13,fontWeight:600,cursor:'pointer',boxShadow:'0 3px 10px rgba(0,137,123,0.3)',fontFamily:'inherit',display:'inline-flex',alignItems:'center',gap:6}}>
            {isSyncing ? '⏳ กำลังซิงค์...' : '🔄 โหลดข้อมูลใหม่จาก Sheets'}
          </button>
          <div style={{fontSize:11,color:'var(--text3)',marginTop:6}}>บันทึกอัตโนมัติทุกครั้งที่มีการเปลี่ยนแปลง กดเพื่อโหลดข้อมูลล่าสุดจาก Sheets</div>
        </div>

        {/* Hold tasks */}
        {holdSummary.length > 0 && (
          <HoldSummaryCard holdSummary={holdSummary} onSelectDate={onSelectDate} />
        )}

        {/* Top frequent */}
        {freqStats.length > 0 && (
          <div className="card" style={{marginTop:12}}>
            <div className="card-header" style={{fontWeight:700,fontSize:15,color:"var(--text)",textTransform:"none",letterSpacing:0}}>รายการซ่อมที่พบบ่อยที่สุด</div>
            <div style={{padding:'12px 14px'}}>
              {freqStats.slice(0,8).map(([desc,count],i) => (
                <div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 0',borderBottom:i<7?'1px solid rgba(194,221,245,0.3)':'none'}}>
                  <span style={{fontSize:13,flex:1,color:'var(--text)'}}><span style={{color:'var(--text3)',marginRight:6,fontWeight:600}}>{i+1}.</span>{desc}</span>
                  <span style={{color:'var(--accent)',fontWeight:700,fontSize:13}}>{count} ครั้ง</span>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>
    </div>
  );
};

// ─── App ───────────────────────────────────────────────────────────────────────
const App = () => {
  const [tasks, setTasks] = useState({});
  const [view, setView] = useState('main');
  const [selYear, setSelYear] = useState(null);
  const [selMonth, setSelMonth] = useState(null);
  const [selDay, setSelDay] = useState(null);
  const [frequent, setFrequent] = useState(() => {
    try { return JSON.parse(localStorage.getItem('mew-freq-v2')) || DEFAULT_FREQUENT; } catch { return DEFAULT_FREQUENT; }
  });
  // theme removed
  const [notif, setNotif] = useState(null);
  const [syncStatus, setSyncStatus] = useState(null);
  const [loading, setLoading] = useState(false);



  // Save frequent
  useEffect(() => {
    try { localStorage.setItem('mew-freq-v2', JSON.stringify(frequent)); } catch(e) {}
  }, [frequent]);

  const showNotif = useCallback((msg) => {
    setNotif(msg);
  }, []);

  const syncFromSheets = useCallback(async () => {
    setLoading(true); setSyncStatus('syncing');
    try {
      const rows = await fetchAllFromSheets();
      if (rows) {
        const map = rowsToMap(rows);
        setTasks(map);
        setSyncStatus('ok');
        showNotif(`โหลดสำเร็จ ${rows.length} รายการ`);
      } else {
        setSyncStatus('err');
        showNotif('⚠ ดึงข้อมูลไม่ได้');
      }
    } catch(e) {
      setSyncStatus('err');
      showNotif('⚠ เกิดข้อผิดพลาด');
    }
    setLoading(false);
    setTimeout(() => setSyncStatus(null), 3000);
  }, [showNotif]);

  // Auto-load from Sheets on mount
  useEffect(() => {
    syncFromSheets();
  }, [syncFromSheets]);

  const taskKey = (y, m, d) => `${y}-${m}-${d}`;

  // รับ year/month/day จาก TaskView โดยตรง เพื่อหลีกเลี่ยง stale closure
  // เมื่อ user กด prev/next วันเร็วๆ
  const handleAddTask = useCallback((task, y, m, d) => {
    const key = taskKey(y, m, d);
    setTasks(prev => ({ ...prev, [key]: [...(prev[key]||[]), task] }));
    saveToSheets(task, key, () => showNotif('⚠ บันทึกไม่สำเร็จ จะลองใหม่อัตโนมัติ'));
  }, [showNotif]);

  const handleUpdateTask = useCallback((updated, y, m, d) => {
    const key = taskKey(y, m, d);
    const t = { ...updated, id: normalizeId(updated.id) };
    setTasks(prev => {
      const arr = (prev[key]||[]).map(x => normalizeId(x.id)===t.id ? t : x);
      return { ...prev, [key]: arr };
    });
    saveToSheets(t, key, () => showNotif('⚠ บันทึกไม่สำเร็จ จะลองใหม่อัตโนมัติ'));
  }, [showNotif]);

  const handleDeleteTask = useCallback((id, y, m, d) => {
    const key = taskKey(y, m, d);
    const nid = normalizeId(id);
    setTasks(prev => ({ ...prev, [key]: (prev[key]||[]).filter(x => normalizeId(x.id)!==nid) }));
    deleteFromSheets(id, () => showNotif('⚠ ลบไม่สำเร็จ จะลองใหม่อัตโนมัติ'));
  }, [showNotif]);

  const handleManageFreq = (action, item) => {
    setFrequent(prev => action==='add' ? [...prev, item] : prev.filter(x=>x!==item));
  };

  const handleDateChange = (offset) => {
    const d = new Date(selYear, selMonth-1, selDay);
    d.setDate(d.getDate()+offset);
    setSelYear(d.getFullYear()); setSelMonth(d.getMonth()+1); setSelDay(d.getDate());
  };

  const handleExportCSV = (y, m) => {
    const rows = [['วันที่','ห้อง','รายการซ่อม','สถานะ'].join(',')];
    for (let d=1; d<=getDaysInMonth(y,m); d++) {
      const key=`${y}-${m}-${d}`;
      (tasks[key]||[]).forEach(t => {
        rows.push([`${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`, t.room, `"${t.description.replace(/"/g,'""')}"`, STATUSES[t.status]?.label||t.status].join(','));
      });
    }
    const blob = new Blob(['\uFEFF'+rows.join('\n')], {type:'text/csv;charset=utf-8;'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `tasks-${y}-${String(m).padStart(2,'0')}.csv`;
    a.click();
  };

  const freqStats = useMemo(() => {
    const c = {};
    Object.values(tasks).forEach(arr => arr.forEach(t => { if (t.description) c[t.description.trim()] = (c[t.description.trim()]||0)+1; }));
    return Object.entries(c).sort(([,a],[,b])=>b-a).slice(0,10);
  }, [tasks]);

  const holdSummary = useMemo(() => {
    const items = [];
    Object.entries(tasks).forEach(([key, arr]) => {
      const [y,m,d] = key.split('-');
      arr.filter(t=>t.status==='hold').forEach(t => items.push({ year:+y, month:+m, day:+d, ...t }));
    });
    return items.sort((a,b) => new Date(b.year,b.month-1,b.day) - new Date(a.year,a.month-1,a.day));
  }, [tasks]);

  if (loading) return (
    <div className="loading">
      <div className="spinner"></div>
      <div style={{color:'var(--text2)',fontSize:14}}>กำลังโหลดข้อมูลจาก Sheets...</div>
    </div>
  );

  const renderView = () => {
    if (view==='tasks') {
      const key = taskKey(selYear, selMonth, selDay);
      return <TaskView
        year={selYear} month={selMonth} day={selDay}
        tasks={tasks[key]||[]}
        allTasks={tasks}
        frequent={frequent}
        onAddTask={task => handleAddTask(task, selYear, selMonth, selDay)}
        onUpdateTask={task => handleUpdateTask(task, selYear, selMonth, selDay)}
        onDeleteTask={id => handleDeleteTask(id, selYear, selMonth, selDay)}
        onBack={() => { setView('days'); }}
        onPrev={() => handleDateChange(-1)}
        onNext={() => handleDateChange(1)}
        onManageFreq={handleManageFreq}
        showNotif={showNotif}
      />;
    }
    if (view==='days') return <DaysView year={selYear} month={selMonth} tasks={tasks}
      onSelectDay={d => { setSelDay(d); setView('tasks'); }}
      onBack={() => setView('months')}
      onExport={handleExportCSV}
    />;
    if (view==='months') return <MonthsView year={selYear} tasks={tasks}
      onSelectMonth={m => { setSelMonth(m); setView('days'); }}
      onBack={() => setView('main')}
    />;
    return <MainMenu tasks={tasks} frequent={frequent} freqStats={freqStats} holdSummary={holdSummary}
      onSelectYear={y => { setSelYear(y); setView('months'); }}
      onSelectDate={(y,m,d) => { setSelYear(y); setSelMonth(m); setSelDay(d); setView('tasks'); }}
      onSync={syncFromSheets}
      isSyncing={syncStatus==='syncing'}
    />;
  };

  return (
    <div style={{minHeight:'100vh',position:'relative'}}>
      {notif && <Notification msg={notif} onClose={()=>setNotif(null)}/>}
      <SyncStatus status={syncStatus}/>
      {renderView()}
      {/* Theme toggle */}

    </div>
  );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
